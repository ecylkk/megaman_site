version: '3'
services:
  web:
    build: .
    image: megaman-web:latest
    environment:
      - RAILS_ENV=development
      - BUNDLE_WITHOUT=production
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
    working_dir: /rails
    ports:
      - "3000:3000"

volumes:
  bundle_data:
